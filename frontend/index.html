<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CampusFlow — The ultimate student productivity platform powered by AI, WhatsApp automation, and Google Calendar integration." />
    <meta name="theme-color" content="#09090b" />
    <title>CampusFlow — AI-Powered Student Productivity</title>
    <!-- Google Fonts: Inter for premium SaaS typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Apply color scheme before render to prevent FOUC -->
    <script>
      (function() {
        var saved = localStorage.getItem('campusflow-theme');
        if (saved === 'light') {
          document.documentElement.style.colorScheme = 'light';
        } else if (saved === 'dark') {
          document.documentElement.style.colorScheme = 'dark';
        } else {
          document.documentElement.style.colorScheme = 'light dark';
        }
      })();
    </script>
    <style>
      /* Prevent flash of white content */
      html { background-color: #09090b; }
      @media (prefers-color-scheme: light) {
        html { background-color: #f8fafc; }
      }
      body { font-family: 'Inter', system-ui, sans-serif; margin: 0; }
    </style>
  </head>
  <body class="min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
